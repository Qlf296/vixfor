<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" role="img" aria-label="Vixfor">
  <defs>
    <linearGradient id="grad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="55%" stop-color="#7C6FF5"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- ══ MARK (40×44, centered in 0-48 y) ══ -->
  <!-- V polygon: two arms meeting at bottom tip -->
  <!-- Arm width = 12, outer width = 40 -->
  <polygon
    points="0,2 12,2 20,42 16,46 8,46"
    fill="url(#grad)"
  />
  <polygon
    points="28,2 40,2 32,46 24,46 20,42"
    fill="url(#grad)"
    opacity="0.75"
  />

  <!-- ══ WORDMARK — Inter 800, tight tracking ══ -->
  <text
    x="56"
    y="35"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="800"
    letter-spacing="-0.055em"
    fill="#0A0A0B"
  >Vixfor</text>
</svg>
