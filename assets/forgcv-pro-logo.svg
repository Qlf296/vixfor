<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" fill="none">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B57FF"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7C843"/>
      <stop offset="50%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="pglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Document icon -->
  <rect x="2" y="2" width="38" height="48" rx="7" fill="url(#pg)" filter="url(#pglow)"/>
  <!-- Page lines -->
  <rect x="9" y="11" width="24" height="3" rx="1.5" fill="white"/>
  <rect x="9" y="18" width="19" height="2.5" rx="1.25" fill="rgba(255,255,255,0.75)"/>
  <rect x="9" y="24" width="22" height="2.5" rx="1.25" fill="rgba(255,255,255,0.75)"/>
  <rect x="9" y="30" width="15" height="2.5" rx="1.25" fill="rgba(255,255,255,0.5)"/>
  <!-- Gold star PRO marker -->
  <path d="M30.5 36 L32 31.5 L33.5 36 L38 36 L34.7 38.8 L36 43.5 L32 40.8 L28 43.5 L29.3 38.8 L26 36 Z" fill="url(#gold)" filter="url(#gglow)"/>

  <!-- ForgCV wordmark -->
  <text x="50" y="24" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="20" font-weight="900" letter-spacing="-0.05em" fill="#0F1225">Forg</text>
  <text x="90" y="24" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="20" font-weight="900" letter-spacing="-0.05em" fill="#5B57FF">CV</text>

  <!-- PRO badge -->
  <rect x="116" y="7" width="38" height="18" rx="6" fill="url(#gold)"/>
  <text x="122" y="19.5" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="10" font-weight="800" letter-spacing="0.12em" fill="#7C2D00">PRO</text>

  <!-- Tagline -->
  <text x="50" y="39" font-family="'Inter', -apple-system, system-ui, sans-serif" font-size="9" font-weight="600" letter-spacing="0.05em" fill="#9CA3AF">by Vixfor</text>
</svg>
