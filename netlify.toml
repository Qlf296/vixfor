# ForgCV by Vixfor — Netlify config
# Updated: 2026-06-30
# Contact form: Netlify Forms → vixfor.contact@gmail.com

# ── Build + compression ────────────────────────────────────────────────────
[build]
  publish = "."

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle  = false
  minify  = true

[build.processing.js]
  bundle  = false
  minify  = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ── Security headers (all pages) ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-XSS-Protection          = "1; mode=block"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://www.google-analytics.com; connect-src 'self' https://www.google-analytics.com; frame-ancestors 'none'"

# ── Asset caching ──────────────────────────────────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── Block sensitive files ──────────────────────────────────────────────────
# ── Legal routes ───────────────────────────────────────────────────────────

