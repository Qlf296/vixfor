# ForgCV by Vixfor — Netlify config
# Updated: 2026-06-29

# ── Build ──────────────────────────────────────────────────────────────────
[build]
  publish = "."

# ── Security headers (all pages) ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-XSS-Protection          = "1; mode=block"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ── Asset caching ──────────────────────────────────────────────────────────
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/og-image.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# ── Block sensitive files ──────────────────────────────────────────────────
[[redirects]]
  from   = "/*.py"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/FORGCV-*.html"
  to     = "/404.html"
  status = 404
  force  = true

[[redirects]]
  from   = "/brand-guide.html"
  to     = "/404.html"
  status = 404
  force  = true

# ── Vixfor ecosystem ──────────────────────────────────────────────────────
[[redirects]]
  from   = "/nextora/*"
  to     = "/vixfor/:splat"
  status = 301

[[redirects]]
  from   = "/vixfor"
  to     = "/vixfor/index.html"
  status = 200

